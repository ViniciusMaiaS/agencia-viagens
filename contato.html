<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato Agencia de Viagens</title>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
        <header>
        <div class="container-fluid header-content">
            
            <img src="images/logo.png" alt="Logo" class="logo">

            <nav>
                <a href="index.html">Inicio</a>
                <a href="pacotes.html">Pacotes</a>
                <a href="sobre.html">Sobre</a>
                <a href="contato.html" class="pagina_ativa">Contato</a>
            </nav>
        </div>
    </header>
    <main>
        <section>
            <h2 style="text-align: center; margin-top: 20px; color: #333;">Chama nós Aqui !!!</h2>
            
            <form class="formulario-contato">
                
                <div class="campo-grupo">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
                </div>
    
                <div class="campo-grupo">
                    <label for="email">E-mail de Contato:</label>
                    <input type="email" id="email" name="email" placeholder="Ex: nome@email.com" required>
                </div>
    
                <div class="campo-grupo">
                    <label for="telefone">Telefone / WhatsApp:</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="Ex: (85) 99999-9999">
                </div>
    
                <div class="campo-grupo">
                    <label for="idade">Idade:</label>
                    <input type="number" id="idade" name="idade" placeholder="Sua idade">
                </div>
    
                <div class="campo-grupo">
                    <label for="destino">Destino de Interesse:</label>
                    <input type="text" id="destino" name="destino" placeholder="Ex: Fernando de Noronha, Paris...">
                </div>
    
                <div class="campo-grupo">
                    <label for="mensagem">Mensagem ou Observações:</label>
                    <textarea id="mensagem" name="mensagem" rows="4" placeholder="Conte-nos mais sobre a viagem dos seus sonhos..."></textarea>
                </div>
    
                <div class="botoes-grupo">
                    <button type="submit" class="btn-enviar">Enviar Mensagem</button>
                    <button type="reset" class="btn-zap">Whats Zap</button>
                </div>
    
            </form>
        </section>
    </main>
    <!-- Alteração feita por Carlos Italo: Adicionado o rodapé da página -->
    <footer>
        <p>&copy; 2026 Agencia de Viagens. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
